<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:image" content="{{ site.url }}/assets/thumbnail.png">
<meta property="og:description" content="{{ page.excerpt | strip_html | default: site.description }}">
<meta property="og:image" content="{{ site.url }}/assets/thumbnail.png">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ site.url }}/assets/thumbnail.png">
